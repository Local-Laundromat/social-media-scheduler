<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Quu</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #facc15 0%, #ca8a04 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      max-width: 400px;
      width: 100%;
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-icon {
      font-size: 48px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 24px;
      color: #1f2937;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      color: #6b7280;
      text-align: center;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 15px;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #fbbf24;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #facc15 0%, #ca8a04 100%);
      color: #1f2937;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 12px rgba(250, 204, 21, 0.3);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(250, 204, 21, 0.5);
    }

    .btn:active {
      transform: translateY(0);
    }

    .toggle-form {
      text-align: center;
      margin-top: 20px;
      color: #6b7280;
      font-size: 14px;
    }

    .toggle-form a {
      color: #f59e0b;
      text-decoration: none;
      font-weight: 600;
    }

    .toggle-form a:hover {
      text-decoration: underline;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .success {
      background: #d1fae5;
      color: #065f46;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .divider {
      text-align: center;
      margin: 30px 0;
      color: #9ca3af;
      font-size: 14px;
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: #e5e7eb;
    }

    .divider::before {
      left: 0;
    }

    .divider::after {
      right: 0;
    }

    .integration-note {
      background: #fef3c7;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #78350f;
    }

    .integration-note strong {
      display: block;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <div class="logo-icon">📱</div>
      <h1 id="formTitle">Welcome Back</h1>
      <p class="subtitle">Queue. Post. Grow.</p>
    </div>

    <div id="integrationNote" class="integration-note" style="display: none;">
      <strong>Coming from OmniBroker or Sun Production?</strong>
      Create an account to connect your integration.
    </div>

    <div id="errorMessage" class="error"></div>
    <div id="successMessage" class="success"></div>

    <form id="authForm">
      <div class="form-group" id="nameGroup" style="display: none;">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="John Doe">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>

      <div class="form-group" id="companyGroup" style="display: none;">
        <label>Company Name (Optional)</label>
        <input type="text" id="company" placeholder="Your Company">
      </div>

      <!-- Team Selection (Signup Only) -->
      <div id="teamSection" style="display: none;">
        <div class="form-group">
          <label>Team Setup</label>
          <div style="display: flex; gap: 20px; margin-bottom: 16px;">
            <label style="display: flex; align-items: center; cursor: pointer; font-weight: 400;">
              <input type="radio" name="teamMode" value="create" id="createTeamRadio" checked style="width: auto; margin-right: 8px;">
              Create New Team
            </label>
            <label style="display: flex; align-items: center; cursor: pointer; font-weight: 400;">
              <input type="radio" name="teamMode" value="join" id="joinTeamRadio" style="width: auto; margin-right: 8px;">
              Join Existing Team
            </label>
          </div>
        </div>

        <div class="form-group" id="createTeamGroup">
          <label>Team Name</label>
          <input type="text" id="teamName" placeholder="Marketing Team">
        </div>

        <div class="form-group" id="joinTeamGroup" style="display: none;">
          <label>Team Invite Code</label>
          <input type="text" id="inviteCode" placeholder="A1B2C3D4E5F6" style="text-transform: uppercase;">
        </div>
      </div>

      <button type="submit" class="btn" id="submitBtn">Sign In</button>
    </form>

    <div class="toggle-form">
      <span id="toggleText">Don't have an account?</span>
      <a href="#" id="toggleLink">Sign Up</a>
    </div>

    <div class="toggle-form" id="forgotPasswordLink" style="margin-top: 10px;">
      <a href="#" onclick="showForgotPassword(event)" style="color: #6b7280; font-size: 13px;">Forgot password?</a>
    </div>
  </div>

  <script>
    let isSignUp = false;
    const form = document.getElementById('authForm');
    const formTitle = document.getElementById('formTitle');
    const submitBtn = document.getElementById('submitBtn');
    const toggleText = document.getElementById('toggleText');
    const toggleLink = document.getElementById('toggleLink');
    const nameGroup = document.getElementById('nameGroup');
    const companyGroup = document.getElementById('companyGroup');
    const teamSection = document.getElementById('teamSection');
    const createTeamGroup = document.getElementById('createTeamGroup');
    const joinTeamGroup = document.getElementById('joinTeamGroup');
    const createTeamRadio = document.getElementById('createTeamRadio');
    const joinTeamRadio = document.getElementById('joinTeamRadio');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');
    const integrationNote = document.getElementById('integrationNote');

    // Check if coming from integration (query params)
    const urlParams = new URLSearchParams(window.location.search);
    const fromApp = urlParams.get('from'); // e.g., ?from=omnibroker
    const returnUrl = urlParams.get('return_url');

    if (fromApp) {
      integrationNote.style.display = 'block';
      isSignUp = true;
      updateFormMode();
    }

    // Toggle between sign in and sign up
    toggleLink.addEventListener('click', (e) => {
      e.preventDefault();
      isSignUp = !isSignUp;
      updateFormMode();
    });

    // Toggle between create team and join team
    createTeamRadio.addEventListener('change', () => {
      if (createTeamRadio.checked) {
        createTeamGroup.style.display = 'block';
        joinTeamGroup.style.display = 'none';
      }
    });

    joinTeamRadio.addEventListener('change', () => {
      if (joinTeamRadio.checked) {
        createTeamGroup.style.display = 'none';
        joinTeamGroup.style.display = 'block';
      }
    });

    function updateFormMode() {
      if (isSignUp) {
        formTitle.textContent = 'Create Account';
        submitBtn.textContent = 'Sign Up';
        toggleText.textContent = 'Already have an account?';
        toggleLink.textContent = 'Sign In';
        nameGroup.style.display = 'block';
        companyGroup.style.display = 'block';
        teamSection.style.display = 'block';
      } else {
        formTitle.textContent = 'Welcome Back';
        submitBtn.textContent = 'Sign In';
        toggleText.textContent = "Don't have an account?";
        toggleLink.textContent = 'Sign Up';
        nameGroup.style.display = 'none';
        companyGroup.style.display = 'none';
        teamSection.style.display = 'none';
      }
      hideMessages();
    }

    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.style.display = 'block';
      successMessage.style.display = 'none';
    }

    function showSuccess(message) {
      successMessage.textContent = message;
      successMessage.style.display = 'block';
      errorMessage.style.display = 'none';
    }

    function hideMessages() {
      errorMessage.style.display = 'none';
      successMessage.style.display = 'none';
    }

    // Handle form submission
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const name = document.getElementById('name').value;
      const company = document.getElementById('company').value;

      try {
        if (isSignUp) {
          // Prepare signup data with team info
          const signupData = { email, password, name, company };

          // Add team creation or invite code
          const teamMode = document.querySelector('input[name="teamMode"]:checked').value;
          if (teamMode === 'create') {
            const teamName = document.getElementById('teamName').value.trim();
            if (!teamName) {
              showError('Please enter a team name');
              return;
            }
            signupData.teamName = teamName;
          } else {
            const inviteCode = document.getElementById('inviteCode').value.trim().toUpperCase();
            if (!inviteCode) {
              showError('Please enter an invite code');
              return;
            }
            signupData.inviteCode = inviteCode;
          }

          // Sign up
          const response = await fetch('/api/auth/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(signupData)
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || 'Sign up failed');
          }

          // Store token and user data
          const token = data.session?.access_token || data.token;
          if (token) {
            localStorage.setItem('auth_token', token);
          }
          localStorage.setItem('user', JSON.stringify(data.user));
          if (data.team) {
            localStorage.setItem('team', JSON.stringify(data.team));
          }

          // Redirect to dashboard
          if (returnUrl) {
            window.location.href = returnUrl;
          } else {
            window.location.href = '/dashboard';
          }
        } else {
          // Sign in
          const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || 'Login failed');
          }

          // Store token and user data
          const token = data.session?.access_token || data.token;
          if (token) {
            localStorage.setItem('auth_token', token);
          }
          localStorage.setItem('user', JSON.stringify(data.user));
          if (data.team) {
            localStorage.setItem('team', JSON.stringify(data.team));
          }

          // Redirect to dashboard
          window.location.href = '/dashboard';
        }
      } catch (error) {
        showError(error.message);
      }
    });

    // Show forgot password modal
    async function showForgotPassword(e) {
      e.preventDefault();

      const email = prompt('Enter your email address to receive a password reset link:');

      if (!email) return;

      if (!email.includes('@')) {
        alert('Please enter a valid email address');
        return;
      }

      try {
        const response = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await response.json();

        if (data.success) {
          showSuccess(data.message);
        } else {
          showError(data.error || 'Failed to send reset email');
        }
      } catch (error) {
        showError('Failed to send reset email. Please try again.');
      }
    }

    // Check if already logged in
    const authToken = localStorage.getItem('auth_token');
    if (authToken) {
      // Verify token is still valid
      fetch('/api/auth/verify', {
        headers: { 'Authorization': `Bearer ${authToken}` }
      })
      .then(res => res.json())
      .then(data => {
        if (data.valid) {
          window.location.href = '/dashboard';
        } else {
          localStorage.removeItem('auth_token');
          localStorage.removeItem('user');
          localStorage.removeItem('team');
        }
      })
      .catch(() => {
        localStorage.removeItem('auth_token');
        localStorage.removeItem('user');
        localStorage.removeItem('team');
      });
    }
  </script>
</body>
</html>
